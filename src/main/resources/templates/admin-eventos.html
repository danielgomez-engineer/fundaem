<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Eventos - Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Eventos (Administrador)</h2>
    <div id="adminEventosMsg"></div>
    <table class="table table-striped" id="tablaEventos" style="display:none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Fecha</th>
                <th>Creador</th>
                <th>Email Creador</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="eventosBody"></tbody>
    </table>
</div>
<script>
    async function cargarEventosAdmin() {
        const token = localStorage.getItem('token');
        const msgDiv = document.getElementById('adminEventosMsg');
        if (!token) {
            msgDiv.innerHTML = '<div class="alert alert-danger">Acceso denegado. Debes iniciar sesión como administrador.</div>';
            return;
        }
        try {
            const resp = await fetch('/api/eventos', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            if (!resp.ok) {
                throw new Error('No autorizado o error al obtener eventos');
            }
            const eventos = await resp.json();
            if (Array.isArray(eventos) && eventos.length > 0) {
                document.getElementById('tablaEventos').style.display = '';
                const tbody = document.getElementById('eventosBody');
                tbody.innerHTML = '';
                eventos.forEach(ev => {
                    tbody.innerHTML += `
                    <tr>
                        <td>${ev.id}</td>
                        <td>${ev.titulo}</td>
                        <td>${ev.fecha}</td>
                        <td>${ev.creador ? ev.creador.nombre : ''}</td>
                        <td>${ev.creador ? ev.creador.email : ''}</td>
                        <td>
                            <a href="/eventos/editar/${ev.id}" class="btn btn-sm btn-warning">Editar</a>
                            <button class="btn btn-sm btn-danger" onclick="eliminarEvento(${ev.id})">Eliminar</button>
                        </td>
                    </tr>`;
                });
            } else {
                msgDiv.innerHTML = '<div class="alert alert-info">No hay eventos registrados.</div>';
            }
        } catch (err) {
            msgDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
        }
    }
    async function eliminarEvento(id) {
        if (!confirm('¿Seguro que deseas eliminar este evento?')) return;
        const token = localStorage.getItem('token');
        try {
            const resp = await fetch(`/api/eventos/${id}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            if (resp.ok) {
                cargarEventosAdmin();
            } else {
                alert('No se pudo eliminar el evento.');
            }
        } catch (err) {
            alert('Error al eliminar el evento.');
        }
    }
    cargarEventosAdmin();
</script>
</body>
</html>
