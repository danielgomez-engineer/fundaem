server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fundaem_db?useSSL=false&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_USER}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  thymeleaf:
    cache: false

jwt:
  secret: ${JWT_SECRET} 
  expiration: 86400000 
